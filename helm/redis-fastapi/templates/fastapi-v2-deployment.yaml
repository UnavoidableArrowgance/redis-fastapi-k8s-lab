apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-api-v2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: python-api-v2
      version: v2
  template:
    metadata:
      labels:
        app: python-api-v2
        version: v2
    spec:
      containers:
        - name: python-api-v2
          image: python-api-v2:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: redis-cm
            - secretRef:
                name: redis-secret