apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis-fastapi
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/UnavoidableArrowgance/redis-fastapi-k8s-lab.git
    targetRevision: main
    path: helm/redis-fastapi
    helm:
      releaseName: redis-fastapi

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true